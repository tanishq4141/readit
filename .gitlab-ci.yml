# Readit — GitLab CI
#
# main branch:
#   android:apk  — debug APK artifact (sideload / internal install)
#   web:deploy   — static Next export + Cloudflare Pages deploy
#
# Optional release signing (future): set CI variables ANDROID_KEYSTORE_BASE64,
# ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD and switch
# the Android job to assembleRelease with a signing config in app/build.gradle.kts.

stages:
  - publish
  - build
  - deploy

variables:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  GRADLE_USER_HOME: "${CI_PROJECT_DIR}/apps/android/.gradle"
  ANDROID_SDK_ROOT: "${CI_PROJECT_DIR}/.android-sdk"
  ANDROID_HOME: "${CI_PROJECT_DIR}/.android-sdk"
  CMDLINE_TOOLS_URL: "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"

# --- Content OTA (public S3) ----------------------------------------------------
# CI variables: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_DEFAULT_REGION,
# READIT_S3_BUCKET, READIT_CONTENT_BASE_URL; optional READIT_S3_PREFIX (default readit)

content:publish:
  stage: publish
  image: node:22-bookworm
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - books/**/*
        - catalog/**/*
  script:
    - apt-get update -qq && apt-get install -y -qq awscli rsync
    - chmod +x scripts/publish-content-s3.sh
    - ./scripts/publish-content-s3.sh
  artifacts:
    name: "readit-content-manifest-${CI_COMMIT_SHORT_SHA}"
    paths:
      - dist/content-manifest.json
    expire_in: 30 days

# --- Android -------------------------------------------------------------------

.android_sdk_setup:
  image: eclipse-temurin:17-jammy
  cache:
    key: android-sdk-v1
    paths:
      - .android-sdk/
  before_script:
    - apt-get update -qq && apt-get install -y -qq wget unzip
    - export PATH="${ANDROID_HOME}/cmdline-tools/latest/bin:${ANDROID_HOME}/platform-tools:${PATH}"
    - |
      if [ ! -x "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" ]; then
        mkdir -p "${ANDROID_HOME}/cmdline-tools"
        wget -q "${CMDLINE_TOOLS_URL}" -O /tmp/cmdline-tools.zip
        unzip -q /tmp/cmdline-tools.zip -d "${ANDROID_HOME}/cmdline-tools"
        mv "${ANDROID_HOME}/cmdline-tools/cmdline-tools" "${ANDROID_HOME}/cmdline-tools/latest"
      fi
    - |
      if [ ! -d "${ANDROID_HOME}/platforms/android-35" ]; then
        yes | sdkmanager --licenses >/dev/null || true
        sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"
      fi

android:apk:
  extends: .android_sdk_setup
  stage: build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  cache:
    key: android-gradle-${CI_COMMIT_REF_SLUG}
    paths:
      - apps/android/.gradle/
    policy: pull-push
  script:
    - cd apps/android
    - chmod +x gradlew
    # Debug APK: no keystore required; fine for sideloading from CI artifacts.
    - ./gradlew assembleDebug --no-daemon --stacktrace
    - |
      APK_SRC="app/build/outputs/apk/debug/app-debug.apk"
      mkdir -p "${CI_PROJECT_DIR}/dist"
      cp "${APK_SRC}" "${CI_PROJECT_DIR}/dist/readit.apk"
      ls -lh "${CI_PROJECT_DIR}/dist/readit.apk"
  artifacts:
    name: "readit-android-${CI_COMMIT_SHORT_SHA}"
    paths:
      - dist/readit.apk
    expire_in: 90 days
    expose_as: "Readit Android debug APK"

# --- Web (static export → Cloudflare Pages, free tier) -------------------------
# CI variables (masked): CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
# Token needs Account → Cloudflare Pages → Edit (not Workers-only).
# Optional: READIT_WEB_URL — e.g. https://readit-web.pages.dev

web:deploy:
  stage: deploy
  image: node:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  cache:
    key: npm-${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - apps/web/node_modules/
  script:
    - npm ci --include=optional
    # Linux native bindings when lockfile was updated on macOS (npm optional-deps bug)
    - npm install -w web --include=optional --no-save @tailwindcss/oxide-linux-x64-gnu@4.3.0 lightningcss-linux-x64-gnu@1.32.0
    - cd apps/web
    - export NEXT_PUBLIC_READIT_CONTENT_BASE_URL="${READIT_CONTENT_BASE_URL}"
    - npm run build
    # First pipeline run: create Pages project (no-op if it already exists)
    - |
      if ! npx wrangler pages project list 2>/dev/null | grep -qw readit-web; then
        npx wrangler pages project create readit-web --production-branch main
      fi
    - npx wrangler pages deploy out --project-name=readit-web --commit-dirty=true
  environment:
    name: production
    url: $READIT_WEB_URL
