<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="stylesheet" href="js/github-dark.min.css" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0c0c0f;
      --text: #d4d4d8;
      --muted: #71717a;
      --accent: #a78bfa;
      --border: #27272a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 1.25rem 1rem 3rem;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.05rem;
      line-height: 1.85;
      -webkit-font-smoothing: antialiased;
    }
    #content { max-width: 42rem; margin: 0 auto; }
  #content h1 { font-size: 1.75rem; color: #fafafa; margin: 0 0 1.25rem; line-height: 1.3; }
    #content h2 { font-size: 1.35rem; color: #f4f4f5; margin: 2.5rem 0 1rem; }
    #content h3 { font-size: 1.15rem; color: #e4e4e7; margin: 2rem 0 0.75rem; }
    #content p { margin: 0 0 1.25rem; }
    #content blockquote {
      margin: 1.5rem 0;
      padding-left: 1rem;
      border-left: 2px solid var(--accent);
      color: var(--muted);
      font-style: italic;
    }
    #content a { color: var(--accent); }
    #content hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
    #content ul, #content ol { margin: 0 0 1.25rem; padding-left: 1.5rem; }
    #content table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      margin: 1.5rem 0;
      display: block;
      overflow-x: auto;
    }
    #content th, #content td {
      border: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      text-align: left;
    }
    #content th { background: #18181b; color: #f4f4f5; }
    #content pre {
      background: #18181b;
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1rem;
      overflow-x: auto;
      font-size: 0.85rem;
      line-height: 1.5;
    }
    #content code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.9em;
    }
    #content p code, #content li code {
      background: #27272a;
      padding: 0.15em 0.35em;
      border-radius: 0.25rem;
    }
    .mermaid-wrap {
      margin: 2rem 0;
      padding: 1rem;
      background: #111114;
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      overflow-x: auto;
    }
    .mermaid-wrap svg { max-width: 100%; height: auto; }
    .mermaid-error {
      margin: 2rem 0;
      padding: 1rem;
      background: #1c1010;
      border: 1px solid #7f1d1d;
      border-radius: 0.75rem;
      color: #fca5a5;
      font-size: 0.9rem;
    }
    .mermaid-error pre {
      margin-top: 0.75rem;
      overflow-x: auto;
      color: #d4d4d8;
    }
  </style>
  <script src="js/marked.min.js"></script>
  <script src="js/mermaid.min.js"></script>
  <script src="js/highlight.min.js"></script>
</head>
<body>
  <article id="content"></article>
  <script src="reader.js"></script>
</body>
</html>
